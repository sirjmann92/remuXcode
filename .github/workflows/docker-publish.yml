name: Publish Docker image

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - 'QUICKSTART.md'
      - 'ROADMAP.md'
      - 'docs/**'
      - 'images/**'
      - 'tests/**'
      - 'legacy/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Auto-bumps the patch version on every publish (2.2.65 → 2.2.66).
      # To cut a minor or major release instead, include "#minor" or
      # "#major" anywhere in a commit message being pushed:
      #   #minor → 2.2.65 becomes 2.3.0   (new feature)
      #   #major → 2.2.65 becomes 3.0.0   (breaking change)
      - name: Determine next version from tags
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n 1)

          if [ -n "$LATEST_TAG" ]; then
            CURRENT="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            # Scan commit messages since the last release for a bump keyword
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=%B)
            if echo "$COMMITS" | grep -qi '#major'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMITS" | grep -qi '#minor'; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          else
            NEW_VERSION="2.0.0"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $NEW_VERSION"

      - name: Create version tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},priority=1000
            type=raw,value=latest,priority=900
            type=sha,prefix=,format=long,priority=200

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # actionlint:ignore
          password: ${{ secrets.DOCKERHUB_TOKEN }} # actionlint:ignore

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: |
            type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
