video:
  enabled: true
  codec: av1
  convert_10bit_x264: true
  convert_8bit_x264: true
  anime_only: true
  anime_auto_detect: true
  anime_crf: 19
  anime_preset: slower
  anime_tune: animation
  anime_framerate: 24000/1001
  live_action_crf: 22
  live_action_preset: slow
  live_action_tune: ''
  live_action_framerate: ''
  av1_anime_crf: 19
  av1_anime_preset: 5
  av1_anime_framerate: 24000/1001
  av1_live_action_crf: 22
  av1_live_action_preset: 4
  av1_live_action_framerate: ''
  pix_fmt: yuv420p10le
  profile: main10
  level: '5.1'
  vbv_maxrate: 0
  vbv_bufsize: 0
  hw_accel: none
  qsv_anime_quality: 18
  qsv_live_action_quality: 21
  qsv_preset: medium
  vaapi_anime_quality: 18
  vaapi_live_action_quality: 21
  nvenc_anime_quality: 18
  nvenc_live_action_quality: 21
  nvenc_preset: p5
audio:
  enabled: true
  anime_only: false
  convert_dts: true
  convert_dts_x: true
  convert_truehd: false
  keep_original: false
  keep_original_dts_x: false
  original_as_secondary: true
  prefer_ac3: false
  ac3_bitrate: 640
  eac3_bitrate: 1536
  aac_surround_bitrate: 512
  aac_stereo_bitrate: 320
cleanup:
  enabled: true
  anime_only: false
  clean_audio: true
  clean_subtitles: true
  keep_languages:
  - eng
  keep_undefined: false
  keep_commentary: true
  keep_audio_description: true
  keep_sdh: true
  anime_keep_original_audio: true
language:
  nfo_enabled: true
  api_enabled: true
  path_fallback_enabled: true
  path_patterns:
  - pattern: (?i)/anime/
    language: jpn
  - pattern: (?i)/korean/
    language: kor
  - pattern: (?i)/chinese/
    language: chi
  - pattern: (?i)/spanish/
    language: spa
  - pattern: (?i)/french/
    language: fre
  default_language: eng
sonarr:
  enabled: true
  url: http://192.168.0.130:8989
  api_key: REDACTED_SONARR_API_KEY
  path_mappings: null
radarr:
  enabled: true
  url: http://192.168.0.130:7878
  api_key: REDACTED_RADARR_API_KEY
  path_mappings: null
processing:
  temp_dir: /tmp
  max_concurrent_jobs: 1
  job_timeout: 7200
  retry_enabled: true
  max_retries: 3
  retry_delay: 60
  ffmpeg_threads: 12
webhook:
  port: 8765
  bind: 0.0.0.0
  processing_delay: 5
  auth_enabled: false
  auth_token: null
logging:
  level: INFO
  file: /var/log/remuxcode.log
  max_size: 10485760
  backup_count: 5
notifications:
  enabled: false
  discord:
    enabled: false
    webhook_url: null
  email:
    enabled: false
    smtp_server: ''
    smtp_port: 587
    username: ''
    password: ''
    from_address: ''
    to_addresses: []
general:
  job_history_days: 30
