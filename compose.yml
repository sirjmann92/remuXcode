services:
  remuxcode:
    container_name: remuxcode
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7889:7889"
    volumes:
      - ./config:/app/config   # Persists config.yaml and jobs.db — created automatically on first run
      - ./logs:/app/logs
      # Mounted at the same paths Sonarr/Radarr use internally, so webhook
      # paths work without any PATH_MAPPING env vars.
      - /mnt/NASferatu:/share:rw
      - /mnt/NAStradamus:/share-exp:rw
      - /mnt/stash:/stash:rw
    environment:
      - TZ=America/Chicago
      - PYTHONUNBUFFERED=1
      - PUID=1000
      - PGID=1000
      - REMUXCODE_API_KEY=${REMUXCODE_API_KEY}
      - SONARR_URL=${SONARR_URL}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=${RADARR_URL}
      - RADARR_API_KEY=${RADARR_API_KEY}
      # - PORT=7889
      # - LOG_LEVEL=DEBUG

    restart: unless-stopped
